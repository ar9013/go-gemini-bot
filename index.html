<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go + HTMX Gemini Chat</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f6f8; display: flex; flex-direction: column; height: 100vh; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 90px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .user-message { align-self: flex-end; background-color: #0c56e9; color: white; border-bottom-right-radius: 4px; }
        .bot-message { align-self: flex-start; background-color: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        
        /* 底部輸入欄 */
        .input-container { position: fixed; bottom: 0; left: 0; right: 0; background-color: white; padding: 15px 20px; border-top: 1px solid #e1e4e8; }
        form { display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; padding: 14px 20px; border: 1px solid #e1e4e8; border-radius: 25px; font-size: 15px; outline: none; }
        .send-btn { background: none; border: none; cursor: pointer; }
        .send-btn svg { fill: #0c56e9; width: 28px; height: 28px; }
        
        /* HTMX 載入中的樣式（讓按鈕變淡） */
        .htmx-request { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="chat-container" id="chat-slot">
        <div class="message bot-message">哈囉！我是 Go + HTMX 驅動的 Gemini 助手！</div>
    </div>

    <div class="input-container">
        <form hx-post="/chat" 
              hx-target="#chat-slot" 
              hx-swap="beforeend" 
              hx-on::after-request="document.getElementById('msg-input').value=''">
            <input type="text" id="msg-input" name="message" class="chat-input" placeholder="Type your message here" autocomplete="off" required>
            <button type="submit" class="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </form>
    </div>

    <script>
        // 小小優化：當有新訊息加入時，自動滾動到底部
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            const container = document.getElementById('chat-slot');
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
